name: Reset Database

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25

      - run: npm install

      - name: Reset DB
        run: npm run migrate:fresh
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}