<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auth Portal</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #f5f5f3;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
      }
      .card {
        background: #fff;
        border: 1px solid #e5e5e3;
        border-radius: 16px;
        padding: 2rem;
        width: 100%;
        max-width: 420px;
      }
      .logo-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 1.5rem;
      }
      .logo-circle {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: #e6f1fb;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .logo-circle i {
        font-size: 22px;
        color: #185fa5;
      }
      .logo-text {
        font-size: 20px;
        font-weight: 500;
      }
      .subtitle {
        text-align: center;
        font-size: 14px;
        color: #888;
        margin-bottom: 1.75rem;
        line-height: 1.5;
      }
      .tab-row {
        display: flex;
        gap: 8px;
        margin-bottom: 1.5rem;
      }
      .tab-btn {
        flex: 1;
        padding: 10px 0;
        font-size: 14px;
        border-radius: 8px;
        border: 1px solid #ddd;
        background: #fff;
        color: #888;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        transition: all 0.15s;
      }
      .tab-btn:hover {
        background: #f5f5f3;
      }
      .tab-btn.active {
        background: #e6f1fb;
        border-color: #b5d4f4;
        color: #185fa5;
        font-weight: 500;
      }
      .google-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 11px 16px;
        border-radius: 8px;
        border: 1px solid #ddd;
        background: #fff;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .google-btn:hover {
        background: #f5f5f3;
      }
      .google-btn:active {
        transform: scale(0.98);
      }
      .google-icon {
        width: 20px;
        height: 20px;
        flex-shrink: 0;
      }
      .mode-label {
        text-align: center;
        font-size: 13px;
        color: #aaa;
        margin-top: 1.25rem;
      }
      .mode-label span {
        color: #185fa5;
        font-weight: 500;
      }
      .response-box {
        margin-top: 1.25rem;
        border-radius: 8px;
        border: 1px solid #e5e5e3;
        background: #f9f9f7;
        display: none;
        overflow: hidden;
      }
      .response-box.show {
        display: block;
      }
      .response-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-bottom: 1px solid #e5e5e3;
        font-size: 13px;
        font-weight: 500;
        color: #888;
      }
      .response-header.success {
        color: #3b6d11;
      }
      .response-header.error {
        color: #a32d2d;
      }
      .response-body {
        padding: 12px 14px;
        font-family: monospace;
        font-size: 12px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 200px;
        overflow-y: auto;
      }
      .loading-dots {
        display: inline-flex;
        gap: 4px;
        align-items: center;
      }
      .loading-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #aaa;
        animation: dot 1.2s infinite;
      }
      .loading-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .loading-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes dot {
        0%,
        80%,
        100% {
          opacity: 0.2;
          transform: scale(0.8);
        }
        40% {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo-wrap">
        <div class="logo-circle">
          <i class="ti ti-user-circle"></i>
        </div>
        <span class="logo-text">Auth Portal</span>
      </div>
      <p class="subtitle">Masuk atau buat akun baru menggunakan Google</p>

      <div class="tab-row">
        <button
          class="tab-btn active"
          id="btn-login"
          onclick="setMode('login')"
        >
          <i class="ti ti-login"></i> Masuk
        </button>
        <button class="tab-btn" id="btn-register" onclick="setMode('register')">
          <i class="ti ti-user-plus"></i> Daftar
        </button>
      </div>

      <div
        id="g_id_onload"
        data-client_id="<GOOGLE_CLIENT_ID>"
        data-callback="handleCredentialResponse"
      ></div>
      <div
        class="g_id_signin"
        data-type="standard"
        data-theme="outline"
        data-size="large"
        data-text="continue_with"
        data-shape="rectangular"
      ></div>

      <p class="mode-label">Mode aktif: <span id="mode-text">masuk</span></p>

      <div class="response-box" id="response-box">
        <div class="response-header" id="response-header">
          <i class="ti ti-server"></i>
          <span id="response-title">Respons server</span>
        </div>
        <div class="response-body" id="response-body"></div>
      </div>
    </div>

    <script>
      let mode = 'login';

      function setMode(m) {
        mode = m;
        document
          .getElementById('btn-login')
          .classList.toggle('active', m === 'login');
        document
          .getElementById('btn-register')
          .classList.toggle('active', m === 'register');
        document.getElementById('mode-text').textContent =
          m === 'login' ? 'masuk' : 'daftar';
        document.getElementById('response-box').classList.remove('show');
      }

      function showLoading() {
        const box = document.getElementById('response-box');
        box.classList.add('show');
        document.getElementById('response-header').className =
          'response-header';
        document.getElementById('response-header').innerHTML =
          `<i class="ti ti-loader"></i><span>Menghubungi server...</span>`;
        document.getElementById('response-body').innerHTML =
          `<div class="loading-dots"><span></span><span></span><span></span></div>`;
      }

      function showResponse(data, isSuccess) {
        const box = document.getElementById('response-box');
        box.classList.add('show');
        const header = document.getElementById('response-header');
        header.className = isSuccess
          ? 'response-header success'
          : 'response-header error';
        const icon = isSuccess ? 'ti-circle-check' : 'ti-alert-circle';
        const label = isSuccess ? 'Berhasil' : 'Terjadi kesalahan';
        header.innerHTML = `<i class="ti ${icon}"></i><span>${label}</span>`;
        document.getElementById('response-body').textContent =
          typeof data === 'string' ? data : JSON.stringify(data, null, 2);
      }

      async function handleCredentialResponse(response) {
        showLoading();
        const endpoint =
          mode === 'register'
            ? 'http://localhost:3000/google-auth/register'
            : 'http://localhost:3000/google-auth/login';
        try {
          const res = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: response.credential }),
          });
          const data = await res.json();
          showResponse(data, res.ok);
        } catch (err) {
          showResponse(
            'Tidak dapat terhubung ke server: ' + err.message,
            false,
          );
        }
      }
    </script>
  </body>
</html>
